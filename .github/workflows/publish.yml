name: 'publish'
on:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Apple Silicon based macs.
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # for Intel based macs.
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-24.04' # for Tauri v1 you could replace this with ubuntu-20.04.
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
      - name: setup node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libappindicator3-dev librsvg2-dev patchelf libasound2-dev \
            libwebkit2gtk-4.1-0=2.44.0-2 \
            libwebkit2gtk-4.1-dev=2.44.0-2 \
            libjavascriptcoregtk-4.1-0=2.44.0-2 \
            libjavascriptcoregtk-4.1-dev=2.44.0-2 \
            gir1.2-javascriptcoregtk-4.1=2.44.0-2 \
            gir1.2-webkit2-4.1=2.44.0-2
      - name: install frontend dependencies
        run: npm install # change this to npm or pnpm depending on which one you use
      - name: apply macOS Tauri config override
        if: matrix.platform == 'macos-latest'
        run: |
          node -e "const fs=require('fs'); const basePath='src-tauri/tauri.conf.json'; const overridePath='src-tauri/tauri.macos.conf.json'; const base=JSON.parse(fs.readFileSync(basePath,'utf8')); const override=JSON.parse(fs.readFileSync(overridePath,'utf8')); const merge=(a,b)=>{ if(Array.isArray(a)&&Array.isArray(b)) return b; if(a&&typeof a==='object'&&b&&typeof b==='object'){ const out={...a}; for(const k of Object.keys(b)){ out[k]=k in a ? merge(a[k], b[k]) : b[k]; } return out; } return b; }; fs.writeFileSync(basePath, JSON.stringify(merge(base, override), null, 2)+'\n');"
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: __VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version
          releaseName: '__VERSION__'
          releaseBody: |
            **See the assets to download this version and install.**

            ---

            # What's New?

            We are committed to implementing behind-the-scenes technical fixes and feature updates to ensure a better user experience.

            <details>

            > 

            </details>
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
